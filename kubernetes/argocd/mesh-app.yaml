apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-mesh
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/nihcosnosaj/bm-homelab.git'
    path: kubernetes/mesh
    targetRevision: main
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: linkerd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true